<div class="authentication-bg">
    <div class="position-absolute start-0 end-0 start-0 bottom-0 w-100 h-100">

                <circle style="fill: rgba(var(--ct-primary-rgb), 0.1);" cx='400' cy='400' r='600' />

    </div>


    <div class="account-pages pt-2 pt-sm-2 pb-2 pb-sm-2 position-relative" *ngIf="!show_forgot_password && !verifyotpscreen">
        <div class="container-fluid">
            <div class="row justify-content-center d-flex">
                <div class="col-xxl-8 col-lg-8 col-md-6  col-12 order-lg-0 order-1">
                    <div class="text-center">
                        <img src="assets/images/loginbg2.png" class="img-fluid">
                    </div>
                </div>
                <div class="col-xxl-4 col-lg-4 col-md-6 col-12 order-lg-0 order-1">
                    <div class="card login-card">
                        <div class="card-body px-4 py-2">
                            <div class="my-auto">
                                <h4 class="text-center">Login</h4>
                                <form #loginfrmref="ngForm">
                                    <div class="mb-2 form-group">
                                        <label for="Username" class="form-label">Username</label>
                                        <input class="form-control" type="text" appAlphanumericOnly appUppercase
                                            id="username" name="username" required oncopy="return false"
                                            oncut="return false" maxlength="15" autocomplete="off"
                                            placeholder="Enter your username" [(ngModel)]="loginform.username"
                                            #username="ngModel" [ngClass]="{'is-invalid': username.invalid && (username.dirty || username.touched),
                                'is-valid': username.value?.length >= 4 && (username.dirty || username.touched)}">
                                        <div *ngIf="username.invalid && (username.dirty || username.touched)"
                                            class="error-message">
                                            <div *ngIf="username.errors">
                                                <div *ngIf="username.errors['required']">
                                                    Username is required.
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="mb-2">
                                        <label for="password" class="form-label">Password</label>
                                        <div class="form-group mb-0 position-relative">
                                            <span class="toggle-password eye" (click)="toggleFieldTextTypeonelogin()"
                                                [ngClass]="{
                                                'inactive' : !fieldTextTypeonelogin,
                                                'active' : fieldTextTypeonelogin}">
                                                <i class="" [ngClass]="{
                                                    'uil-eye-slash' : !fieldTextTypeonelogin,
                                                    'uil-eye' : fieldTextTypeonelogin}"></i>
                                            </span>
                                            <input class="form-control pass-input"
                                                [type]="fieldTextTypeonelogin ? 'text' : 'password'" required
                                                id="password" name="password" oncopy="return false"
                                                oncut="return  false" maxlength="15" autocomplete="off"
                                                [(ngModel)]="loginform.password" placeholder="Enter your password"
                                                #password="ngModel"
                                                [ngClass]="{'is-invalid': password.invalid && (password.dirty || password.touched),
                                      'is-valid': password.value?.length >= 4 && (password.dirty || password.touched)}">
                                            <div *ngIf="password.invalid && (password.dirty || password.touched)"
                                                class="error-message">
                                                <div *ngIf="password.errors">
                                                    <div *ngIf="password.errors['required']">
                                                        Password is required.
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                        <a (click)="forgot_password()">Forgot password</a>
                                    </div>
                                    <div class="mb-2 form-group">
                                        <div class="row">
                                            <div class="col-xl-4 col-4">
                                                <h3 class="captcha-text">{{capthform.imgurl}}</h3>
                                            </div>
                                            <div class="col-xl-2 col-2">
                                                <button class="btn btn-primary" type="submit" (click)="Get_captcha()"><i
                                                        class="uil-refresh"></i></button>
                                            </div>
                                            <div class="col-xl-6 col-6">
                                                <input class="form-control" type="text" id="captchvalue"
                                                    name="captchvalue" required appNumericsOnlyEnter
                                                    [(ngModel)]="capthform.captchvalue"
                                                    title=" Please enter the result here" oncopy="return false"
                                                    oncut="return false" #captchvalue="ngModel" autocomplete="off"
                                                    name="Conformation" maxlength="2"
                                                    placeholder="Enter the result here"
                                                    [ngClass]="{'is-invalid': captchvalue.invalid && (captchvalue.dirty || captchvalue.touched),
                                         'is-valid': captchvalue.value?.length >= 2 && (captchvalue.dirty || captchvalue.touched)}">

                                                <div *ngIf="captchvalue.invalid && (captchvalue.dirty || captchvalue.touched)"
                                                    class="error-message">
                                                    <div *ngIf="captchvalue.errors">
                                                        <div *ngIf="captchvalue.errors['required']">
                                                            result is required.
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="d-grid mb-0 text-center">
                                        <!-- login_submit_form() -->
                                        <button class="btn btn-success" type="submit" (click)="login_submit_form()"
                                            [disabled]="!loginfrmref.form.valid"><i class="mdi mdi-login"></i> Log in
                                        </button>
                                    </div>
                                </form>
                            </div>


                            <div class="bottom-text text-center mb-1">
                                <p>If you've forgotten your password, click <a href="javascript:void(0);"
                                        (click)="forgot_password()">'Forgot Password!'</a></p>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div *ngIf="show_forgot_password">
        <app-forgotpassword (listenParentHandler)="buttonClick()"></app-forgotpassword>
    </div>
    <div class="authentication py-4" *ngIf="verifyotpscreen">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-xl-9 col-12">
                    <div class="card auth-card">
                        <div class="card-body p-0">
                            <div class="row justify-content-center d-flex align-items-center">
                                <div class="col-xl-5 col-lg-5 col-md-6 col-12">
                                    <div class="general-login">
                                        <img src="assets/images/otp.png" class="img-fluid">
                                        <p>Verify OTP</p>
                                    </div>
                                </div>
                                <div class="col-xl-7 col-lg-7 col-md-6 col-12">
                                    <div class="general-text">
                                        <h5 class="text-center">Verify OTP</h5>
                                        <h4 class="text-center mb-2 text-dark">Please Authenticate your Mobile Number</h4>
                                        <p class="fs-4 text-dark text-center">OTP sent to 888xxxx009</p>
                                        <div class="d-flex gap-2 justify-content-center mb-3">
                                            <input type="text" #otp0 (input)="moveToNext($event, 0)" maxlength="1" [(ngModel)]="otp0" class="form-control text-center otp-box">
                                            <input type="text" #otp1 (input)="moveToNext($event, 1)" maxlength="1" [(ngModel)]="otp1" class="form-control text-center otp-box">
                                            <input type="text" #otp2 (input)="moveToNext($event, 2)" maxlength="1" [(ngModel)]="otp2" class="form-control text-center otp-box">
                                            <input type="text" #otp3 (input)="moveToNext($event, 3)" maxlength="1" [(ngModel)]="otp3" class="form-control text-center otp-box">
                                            <input type="text" #otp4 (input)="moveToNext($event, 4)" maxlength="1" [(ngModel)]="otp4" class="form-control text-center otp-box">
                                            <input type="text" #otp5 (input)="moveToNext($event, 5)" maxlength="1" [(ngModel)]="otp5" class="form-control text-center otp-box">
                                          </div>
                                          
                                        <div class="row justify-content-center mb-2">
                                            <div class="col-sm-3">
                                                <p class="text-danger">Time:{{ minutes }}:{{remainingSeconds}}</p>
                                            </div>
                                            <div class="col-sm-3">
                                                <span class="text-center"> <i class="fa-regular fa-eye-slash"></i></span>
                                            </div>
                                            <div class="col-sm-3">
                                                <button class="text-dark bg-light disabled rounded-1 b1" (click)="onResendClick()">Resend OTP</button>
                                            </div>
                                        </div>
                                        <button class="btn rounded-pill text-white text-center w-100 my-1">Login</button>
                                        <button class="btn rounded-pill text-white text-center w-100 my-1" (click)="cancelotp()">Cancel</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
