<!doctype html>
<html lang="en" data-layout="topnav">

<head>
    <meta charset="utf-8">
    <title>APCRS</title>
    <base href="/">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="icon" type="image/x-icon" href="assets/images/aplogo.png">
    <link rel="shortcut icon" sizes="180x180" href="assets/images/aplogo.png">
    <link rel="stylesheet" href="assets/css/aos.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
     <script src="assets/dash/js/admin-config.js"></script>
    <script src="assets/dash/js/app.min.js"></script>
   </head>

<body>
    <app-root></app-root>

    <script>
        window.onpopstate = function (e) {
            window.history.forward(1);
        };
        document.oncontextmenu = document.body.oncontextmenu = function () { return false; }
        document.onkeydown = function (e) {
            if (e.keyCode == 123) {
                return false;
            }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) {
                return false;
            }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) {
                return false;
            }
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) {
                return false;
            }
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) {
                return false;
            }
        }
    </script>

    <script src="assets/js/aos.js"></script>
    <script>
        AOS.init();
    </script>
</body>

</html>
